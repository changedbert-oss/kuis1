<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- Meta viewport sangat penting agar tampilan bisa menyesuaikan ukuran layar HP -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar Membuat TMDB Clone</title>
    
</head>

    <style>
        
        * {
            margin: 0;
            padding: 0;
            
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            
            background-color: #0d1137; 
            color: white;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            
            justify-content: space-between; 
            align-items: center;
            padding-bottom: 30px;
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            color: #01b4e4;
            display: flex;
            align-items: center;
            gap: 10px;
        }

  
        .logo-box {
            width: 60px;
            height: 22px;
            background-color: #01b4e4;
            border-radius: 20px;
        }

        .hero {
            
            background: linear-gradient(rgba(3, 37, 65, 0.7), rgba(3, 37, 65, 0.7)), 
                        url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQiw9cgNkgNfhLmliQ2YX1wJgp07KpZBkci4Q&s') no-repeat center/cover;
            padding: 60px 40px;
            border-radius: 15px;
            margin-bottom: 40px;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 30px;
        }

       
        .search-container {
            position: relative;
            width: 100%;
        }

        .search-input {
            width: 100%;
            padding: 15px 30px;
            border-radius: 40px;
            border: none;
            font-size: 1.1rem;
            outline: none;
        }

    
        .upcoming-grid {
            display: grid;
           
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px;
            margin-bottom: 50px;
        }

        /* Kartu Film Umum */
        .movie-card {
            background-color: #1a1e4a;
            border-radius: 12px;
            overflow: hidden; 
            transition: transform 0.3s ease; 
        }

        .movie-card:hover {
            transform: scale(1.03); /* Trigger */
        }

        .movie-card img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }


        .featured-movie {
            
            grid-column: span 2;
            grid-row: span 2;
        }

        .info {
            padding: 12px;
        }

        .info h4 {
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .info span {
            font-size: 0.85rem;
            color: #bdc3c7;
        }


        .now-playing-row {
            display: flex;
            gap: 15px;
            overflow-x: auto; 
            padding-bottom: 20px;
        }

        
        .now-playing-row::-webkit-scrollbar {
            display: none;
        }

        .poster-small {
            min-width: 160px; 
            border-radius: 10px;
            height: 240px;
            background-color: #2c3e50;
            object-fit: cover;
        }

        /* TABLET */
        @media (max-width: 992px) {
            .upcoming-grid {
               
                grid-template-columns: repeat(2, 1fr);
            }
            .hero h1 { font-size: 2.5rem; }
            .hero p { font-size: 1.4rem; }
        }

        /* HANDPHONE */
        @media (max-width: 600px) {
            .upcoming-grid {
               
                grid-template-columns: 1fr;
            }
          
            .featured-movie {
                grid-column: span 1;
                grid-row: span 1;
            }
            .hero { padding: 30px 20px; }
            .hero h1 { font-size: 1.8rem; }
            .hero p { font-size: 1rem; }
        }

    </style>
